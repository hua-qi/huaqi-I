name: 日终复盘

on:
  schedule:
    - cron: '0 15 * * *'   # UTC 15:00 = 北京时间 23:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: YOUR_USERNAME/huaqi-growing
          path: huaqi-src

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huaqi
        run: pip install -e huaqi-src/

      - name: Generate daily report
        id: report
        env:
          HUAQI_DATA_DIR: ${{ github.workspace }}
          HUAQI_SKIP_RECOVERY: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          huaqi report daily
          echo "file=$(ls reports/daily/$(date +%F)-evening.md 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main && git checkout main && git reset --hard origin/main
          git config user.name "Huaqi Bot"
          git config user.email "bot@huaqi.local"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: generate daily report $(date +%F)"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push
          fi

      - name: Notify success
        if: success()
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          REPORT=$(cat reports/daily/$(date +%F)-evening.md 2>/dev/null || echo "报告内容读取失败")
          bash .github/workflows/notify.sh \
            "✅ 日终复盘已生成" \
            "${REPORT}"

      - name: Notify failure
        if: failure()
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          bash .github/workflows/notify.sh \
            "❌ 日终复盘生成失败" \
            "请查看运行日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
