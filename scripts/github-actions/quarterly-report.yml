name: 季报

on:
  schedule:
    # 每月 28-31 号 22:00 北京时间 (UTC 14:00)，季度月份 (3,6,9,12)
    - cron: '0 14 28-31 3,6,9,12 *'
  workflow_dispatch:

jobs:
  check-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: lianzimeng05/huaqi-growing
          path: huaqi-src

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check if last day of quarter
        id: check
        run: |
          python3 -c "
          from datetime import date, timedelta
          today = date.today()
          is_quarter_end = today.month in (3, 6, 9, 12) and (today + timedelta(days=1)).month != today.month
          print(f'is_quarter_end={str(is_quarter_end).lower()}')
          if is_quarter_end:
              print(f'{today} is the last day of Q{(today.month-1)//3+1}, proceeding.')
          else:
              print('Not the last day of the quarter, skipping.')
          " >> $GITHUB_OUTPUT

      - name: Install huaqi
        if: steps.check.outputs.is_quarter_end == 'true'
        run: pip install -e huaqi-src/

      - name: Generate quarterly report
        if: steps.check.outputs.is_quarter_end == 'true'
        id: report
        env:
          HUAQI_DATA_DIR: ${{ github.workspace }}
          HUAQI_SKIP_RECOVERY: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          huaqi report quarterly
          echo "file=$(ls reports/quarterly/$(date +%F)-quarterly.md 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.is_quarter_end == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main && git checkout main && git reset --hard origin/main
          git config user.name "Huaqi Bot"
          git config user.email "bot@huaqi.local"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            Q=$(( ($(date +%m) - 1) / 3 + 1 ))
            git commit -m "chore: generate quarterly report $(date +%Y)-Q${Q}"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push
          fi

      - name: Notify success
        if: success() && steps.check.outputs.is_quarter_end == 'true'
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          REPORT=$(cat reports/quarterly/$(date +%F)-quarterly.md 2>/dev/null || echo "报告内容读取失败")
          bash .github/workflows/notify.sh \
            "✅ 季报已生成" \
            "${REPORT}"

      - name: Notify failure
        if: failure()
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          bash .github/workflows/notify.sh \
            "❌ 季报生成失败" \
            "请查看运行日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
